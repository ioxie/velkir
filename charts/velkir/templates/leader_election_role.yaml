{{/*
Namespaced Role + RoleBinding for the leader-election lease. Scoped to
the operator's own namespace so the lease only contends within the
single Deployment's replicas.
*/}}
{{- if .Values.leaderElection.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "velkir.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "velkir.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "velkir.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "velkir.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "velkir.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "velkir.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
