{{/*
Operator-self ServiceMonitor for the metrics endpoint. The
monitoring.coreos.com CRD isn't a hard dependency — gated on
metrics.serviceMonitor.enabled so installs without
prometheus-operator can keep the chart simple.

The metrics endpoint serves a CA-signed leaf cert minted by the dynauth
Authority. The CA bundle lives in
`velkir-webhook-ca` (legacy name; that Secret holds the operator-
wide root CA — both webhook and metrics leaves chain to it). serverName
must match the SAN baked into the metrics leaf, which is built from the
metrics Service short name.
*/}}
{{- if .Values.metrics.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "velkir.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "velkir.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "velkir.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames: [{{ .Release.Namespace }}]
  endpoints:
    - port: metrics
      interval: {{ .Values.metrics.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout | default "10s" }}
      # The operator stamps namespace/pod/name on every per-CR gauge
      # to point at the watched CR; the dashboards filter on those.
      # Without honorLabels Prometheus's default collision rule keeps
      # the scrape-target's labels (operator pod's own namespace/pod)
      # and renames the operator-stamped originals to exported_*,
      # which leaves the Single Deployment dashboard's namespace
      # dropdown surfacing only the operator's own namespace.
      honorLabels: true
      scheme: https
      # Operator's secure metrics server runs with
      # filters.WithAuthenticationAndAuthorization (cmd/main.go); every
      # scrape must carry a Bearer token whose ServiceAccount has /metrics
      # access. The metrics-reader ClusterRoleBinding (metrics-rbac.yaml)
      # grants that to the operator's own SA, and the metrics-token
      # Secret holds a long-lived token kube-controller-manager populates.
      bearerTokenSecret:
        name: {{ include "velkir.fullname" . }}-metrics-token
        key: token
      tlsConfig:
        ca:
          secret:
            name: velkir-webhook-ca
            key: ca.crt
        serverName: {{ include "velkir.metricsServiceName" . }}.{{ .Release.Namespace }}.svc
{{- end }}
