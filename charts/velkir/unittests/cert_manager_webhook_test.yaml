suite: cert-manager opt-in templates
templates:
  - cert-manager-webhook.yaml
  - mutatingwebhookconfiguration.yaml
  - validatingwebhookconfiguration.yaml
tests:
  - it: renders no Issuer or Certificate when certManager is disabled (default)
    asserts:
      - hasDocuments:
          count: 0
        template: cert-manager-webhook.yaml

  - it: skips inject-ca-from annotation on the validating webhook when certManager is disabled (default)
    template: validatingwebhookconfiguration.yaml
    asserts:
      - isKind:
          of: ValidatingWebhookConfiguration
      - notExists:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]

  - it: skips inject-ca-from annotation on the mutating webhook when certManager is disabled (default)
    template: mutatingwebhookconfiguration.yaml
    asserts:
      - isKind:
          of: MutatingWebhookConfiguration
      - notExists:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]

  - it: renders Issuer and Certificate when certManager is enabled
    set:
      webhook:
        certManager:
          enabled: true
        selfSigned:
          enabled: false
    template: cert-manager-webhook.yaml
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Issuer
        documentIndex: 0
      - equal:
          path: spec.selfSigned
          value: {}
        documentIndex: 0
      - isKind:
          of: Certificate
        documentIndex: 1
      # Pinned to the operator-detected name (dynauth.LeafSecretName), not
      # the release-prefixed fullname helper — the runtime probe in
      # CertManagerOptedIn looks up by this literal.
      - equal:
          path: metadata.name
          value: velkir-webhook-cert
        documentIndex: 1
      - equal:
          path: spec.secretName
          value: velkir-webhook-cert
        documentIndex: 1
      - equal:
          path: spec.dnsNames[0]
          value: RELEASE-NAME-velkir-webhook.NAMESPACE.svc
        documentIndex: 1
      - equal:
          path: spec.dnsNames[1]
          value: RELEASE-NAME-velkir-webhook.NAMESPACE.svc.cluster.local
        documentIndex: 1
      - equal:
          path: spec.issuerRef.kind
          value: Issuer
        documentIndex: 1

  - it: adds inject-ca-from annotation on the validating webhook when certManager is enabled
    set:
      webhook:
        certManager:
          enabled: true
        selfSigned:
          enabled: false
    template: validatingwebhookconfiguration.yaml
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
          value: NAMESPACE/velkir-webhook-cert

  - it: adds inject-ca-from annotation on the mutating webhook when certManager is enabled
    set:
      webhook:
        certManager:
          enabled: true
        selfSigned:
          enabled: false
    template: mutatingwebhookconfiguration.yaml
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
          value: NAMESPACE/velkir-webhook-cert
