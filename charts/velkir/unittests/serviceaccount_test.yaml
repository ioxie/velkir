suite: operator service account
templates:
  - serviceaccount.yaml
tests:
  - it: renders a ServiceAccount when serviceAccount.create is true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-velkir

  - it: disables token automount at the SA level
    # Defense-in-depth alongside the Pod-level automount=false:
    # any pod that uses this SA without explicit Pod-level override
    # also gets no automount, even outside the operator Deployment.
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: skips ServiceAccount rendering when serviceAccount.create is false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: honours serviceAccount.annotations
    set:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/operator
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/operator
