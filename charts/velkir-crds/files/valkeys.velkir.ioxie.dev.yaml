                  suspendedFrom:
                    description: |-
                      SuspendedFrom records the rollout state in flight at the moment
                      the CR transitioned into Degraded on quorum loss. Stamped on the
                      abort edge (RolloutPending → Degraded stamps "RolloutPending";
