name: Enhancement proposal
description: Propose a new feature or an improvement
title: "enh: <short title>"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: The problem you are trying to solve, or the use case.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What you would like the operator to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why you set them aside.
    validations:
      required: false
