# Publish the docs/ directory to GitHub Pages as plain static files.
# docs/ is uploaded verbatim and served straight from the Pages
# deployment artifact — there is no static-site generator step and no
# build tooling of any kind. Because it deploys through the Pages
# environment artifact rather than pushing to the gh-pages branch, it
# does not collide with the chart-releaser helm-repo output.
name: docs-pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch: {}

# Read-only by default; the Pages write + OIDC token scopes are
# elevated only on the deploy job below (least privilege).
permissions:
  contents: read

# Serialize Pages deployments; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
