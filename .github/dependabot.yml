# Dependabot update config for the public mirror.
# github-actions bumps rewrite the pinned commit SHA together with its
# trailing version comment; docker bumps rewrite digest-pinned FROM refs.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
    groups:
      # Minor/patch Go bumps land as one PR; majors stay separate.
      go-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      # All action bumps land as one PR per interval.
      actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    commit-message:
      prefix: "build"
