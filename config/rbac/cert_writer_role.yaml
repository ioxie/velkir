# Namespaced Role for the dynauth cert injector subsystem.
# The injector creates and rotates the operator's webhook TLS Secret
# in the operator's own namespace; cluster-wide Secret WRITE would be
# the canonical operator-CVE pattern (cf. CVE-2025-55196,
# CVE-2025-59303), so the chart and kustomize both split: cluster-wide
# READ for user auth Secrets, namespaced WRITE only for the cert
# injector's own Secret.
#
# Kubebuilder RBAC markers can only generate cluster-scoped Roles, so
# this file is hand-crafted. The corresponding chart split lives in
# charts/velkir/templates/role.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-writer-role
  namespace: system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-writer-rolebinding
  namespace: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-writer-role
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: system
