---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-velkir-ioxie-dev-v1beta1-valkey
  failurePolicy: Ignore
  name: mvalkey-v1beta1.kb.io
  rules:
  - apiGroups:
    - velkir.ioxie.dev
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - valkeys
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-velkir-ioxie-dev-v1beta1-valkey
  failurePolicy: Fail
  name: vvalkey-v1beta1.kb.io
  rules:
  - apiGroups:
    - velkir.ioxie.dev
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - valkeys
  sideEffects: None
